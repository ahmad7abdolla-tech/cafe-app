<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"
    />
    <title>کافه فست فود لیر | سفارش آنلاین</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>☕ کافه فست فود لیر</h1>
        <p>سفارش آنلاین غذا و نوشیدنی</p>
      </div>

      <!-- Step 1: Customer Info -->
      <div id="step1" class="step active">
        <div class="card">
          <h2>✨ اطلاعات شما</h2>
          <div class="form-group">
            <label>👤 نام و نام خانوادگی</label>
            <input
              type="text"
              id="customerName"
              class="form-control"
              placeholder="مثال: احمد رضایی"
            />
          </div>
          <div class="form-group">
            <label>📱 شماره موبایل</label>
            <input
              type="tel"
              id="customerPhone"
              class="form-control"
              placeholder="مثال: 09123456789"
            />
          </div>
          <button id="nextToMenu" class="btn btn-primary" style="width: 100%">
            🍽️ مشاهده منو
          </button>
        </div>
      </div>

      <!-- Step 2: Menu -->
      <div id="step2" class="step">
        <div class="card">
          <h2>🍕 منوی کافه</h2>
          <div id="menuList" class="menu-grid"></div>
        </div>
        <div class="btn-cart" id="viewCartBtn">
          🛒 <span id="cartCount">0</span>
        </div>
      </div>

      <!-- Step 3: Cart & Delivery -->
      <div id="step3" class="step">
        <div class="card">
          <h2>🛍️ سبد خرید</h2>
          <div id="cartItems"></div>
          <div class="cart-total">
            💰 جمع کل: <span id="cartTotal">0</span> تومان
          </div>

          <hr style="margin: 15px 0; border-color: #f0e6d8" />

          <h3>🚚 نحوه تحویل</h3>
          <select id="deliveryType" class="form-control">
            <option value="pickup">🏠 حضوری (تحویل در کافه)</option>
            <option value="delivery">🚛 ارسال با پیک</option>
          </select>

          <div id="addressField" style="display: none">
            <div class="form-group">
              <label>📍 آدرس تحویل</label>
              <textarea
                id="deliveryAddress"
                class="form-control"
                rows="2"
                placeholder="استان، شهر، خیابان، پلاک..."
              ></textarea>
            </div>
          </div>

          <h3>⏰ زمان تحویل</h3>
          <div class="form-row">
            <div class="form-group">
              <label>📅 تاریخ</label>
              <input
                type="text"
                id="pickupDate"
                class="form-control"
                placeholder="۱۴۰۵/۰۲/۱۹"
              />
            </div>
            <div class="form-group">
              <label>🕐 ساعت</label>
              <input type="time" id="pickupTime" class="form-control" />
            </div>
          </div>

          <div class="buttons-row">
            <button id="backToMenu" class="btn btn-secondary" style="flex: 1">
              🔙 بازگشت
            </button>
            <button id="submitOrder" class="btn btn-primary" style="flex: 1">
              ✅ ثبت سفارش
            </button>
          </div>
        </div>
      </div>

      <!-- Step 4: Success -->
      <div id="step4" class="step">
        <div class="card success-card">
          <div class="success-icon">🎉</div>
          <h2>سفارش شما ثبت شد!</h2>
          <p>شماره سفارش: <strong id="orderId"></strong></p>
          <p style="color: #7f8c8d; font-size: 14px; margin-top: 10px">
            پرسنل کافه به زودی سفارش شما را آماده می‌کنند.
          </p>
          <button
            id="newOrderBtn"
            class="btn btn-primary"
            style="margin-top: 20px"
          >
            🔄 سفارش جدید
          </button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
