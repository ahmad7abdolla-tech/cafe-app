<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"
    />
    <title>پنل مالک | کافه فست فود لیر</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>👑 پنل مدیریت</h1>
        <p>کافه فست فود لیر</p>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="staff">👥 مدیریت پرسنل</button>
        <button class="tab-btn" data-tab="settings">⚙️ تنظیمات</button>
      </div>

      <div id="staffTab" class="tab-content active">
        <div class="card">
          <h2>➕ افزودن پرسنل جدید</h2>
          <div class="form-row">
            <div class="form-group">
              <label>👤 نام کاربری</label>
              <input
                type="text"
                id="newStaffUsername"
                class="form-control"
                placeholder="نام کاربری"
              />
            </div>
            <div class="form-group">
              <label>🔑 رمز عبور</label>
              <input
                type="text"
                id="newStaffPassword"
                class="form-control"
                placeholder="رمز عبور"
              />
            </div>
          </div>
          <button id="addStaffBtn" class="btn btn-primary" style="width: 100%">
            ➕ افزودن پرسنل
          </button>
        </div>

        <div class="card">
          <h2>📋 لیست پرسنل</h2>
          <div id="staffList"></div>
        </div>
      </div>

      <div id="settingsTab" class="tab-content">
        <div class="card">
          <h2>🚚 تنظیمات هزینه پیک</h2>
          <div
            id="deliveryFeeDisplay"
            style="
              margin-bottom: 15px;
              padding: 10px;
              background: #fefcf8;
              border-radius: 16px;
              text-align: center;
            "
          ></div>
          <div class="form-group">
            <label>💰 هزینه ارسال با پیک (تومان)</label>
            <input
              type="number"
              id="deliveryFee"
              class="form-control"
              placeholder="مثال: 5000 (عدد 0 یعنی رایگان)"
            />
          </div>
          <button
            id="saveDeliveryFeeBtn"
            class="btn btn-primary"
            style="width: 100%"
          >
            💾 ذخیره تنظیمات
          </button>
        </div>
      </div>
    </div>

    <div class="logout-container">
      <button id="ownerLogoutBtn" class="btn-logout">🚪 خروج از پنل</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
